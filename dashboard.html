<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#dfe9f3,#ffffff);
      min-height:100vh;
    }

    .navbar{
      background:linear-gradient(90deg,#141e30,#243b55);
    }

    .navbar-brand,
    .nav-link{
      color:white !important;
      font-weight:bold;
    }

    .hero{
      text-align:center;
      padding:50px 20px 30px;
    }

    .hero h1{
      font-weight:bold;
      color:#243b55;
    }

    .card-box{
      border:none;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.12);
      transition:0.3s;
    }

    .card-box:hover{
      transform:translateY(-8px);
    }

    .btn-dash{
      border-radius:25px;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">Auth Project</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="reset.html">Reset</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="hero">
    <h1>Welcome to Dashboard</h1>
    <p class="text-muted">Manage your account with creative dashboard cards</p>
  </div>

  <div class="container pb-5">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card card-box p-3">
          <div class="card-body">
            <h4>Profile</h4>
            <p>View and edit your profile details here.</p>
            <button class="btn btn-primary btn-dash">Open</button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card card-box p-3">
          <div class="card-body">
            <h4>Settings</h4>
            <p>Manage account settings and password security.</p>
            <button class="btn btn-success btn-dash">Open</button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card card-box p-3">
          <div class="card-body">
            <h4>Reports</h4>
            <p>Check activity, usage and login reports.</p>
            <button class="btn btn-danger btn-dash">Open</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
