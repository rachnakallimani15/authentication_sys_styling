<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#667eea,#764ba2);
    }

    .main-card{
      width:100%;
      max-width:700px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(12px);
      border-radius:25px;
      padding:40px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
      text-align:center;
      color:white;
    }

    .main-card h1{
      font-weight:bold;
      margin-bottom:10px;
    }

    .main-card p{
      margin-bottom:30px;
      color:#f1f1f1;
    }

    .btn-custom{
      border:none;
      border-radius:30px;
      padding:12px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn-custom:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 18px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="main-card mx-auto">
      <h1>Authentication System</h1>
      <p>Creative Bootstrap Project</p>

      <div class="row g-3">
        <div class="col-md-6">
          <a href="login.html" class="btn btn-warning btn-custom w-100">Login</a>
        </div>
        <div class="col-md-6">
          <a href="register.html" class="btn btn-info btn-custom w-100">Register</a>
        </div>
        <div class="col-md-6">
          <a href="forgot.html" class="btn btn-light btn-custom w-100">Forgot Password</a>
        </div>
        <div class="col-md-6">
          <a href="reset.html" class="btn btn-danger btn-custom w-100">Reset Password</a>
        </div>
        <div class="col-12">
          <a href="dashboard.html" class="btn btn-success btn-custom w-100">Go to Dashboard</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
