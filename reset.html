<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#f7971e,#ffd200);
    }

    .reset-box{
      width:100%;
      max-width:430px;
      background:white;
      border-radius:20px;
      padding:35px;
      box-shadow:0 12px 30px rgba(0,0,0,0.25);
    }

    .reset-box h2{
      text-align:center;
      font-weight:bold;
      margin-bottom:25px;
      color:#d97706;
    }

    .form-control{
      border-radius:12px;
      padding:12px;
    }

    .btn-reset{
      background:#f59e0b;
      color:white;
      border:none;
      border-radius:25px;
      padding:12px;
      font-weight:bold;
    }

    .btn-reset:hover{
      background:#d97706;
    }
  </style>
</head>
<body>

  <div class="reset-box">
    <h2>Reset Password</h2>

    <form>
      <div class="mb-3">
        <label>New Password</label>
        <input type="password" class="form-control" id="newPassword" placeholder="Enter new password">
      </div>

      <div class="mb-3">
        <label>Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="showPass" onclick="togglePassword()">
        <label class="form-check-label" for="showPass">Show Password</label>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-reset">Update Password</button>
      </div>

      <div class="text-center">
        <a href="login.html">Back to Login</a>
      </div>

      <div class="text-center mt-3">
        <a href="index.html" class="btn btn-outline-dark btn-sm">Back to Home</a>
      </div>
    </form>
  </div>

  <script>
    function togglePassword(){
      let a = document.getElementById("newPassword");
      let b = document.getElementById("confirmPassword");

      if(a.type === "password"){
        a.type = "text";
        b.type = "text";
      } else {
        a.type = "password";
        b.type = "password";
      }
    }
  </script>

</body>
</html>
